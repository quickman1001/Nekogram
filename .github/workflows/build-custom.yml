name: Build Nekogram

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configure Gradle Memory
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties

      - name: Setup Keystore & local.properties
        run: |
          keytool -genkey -v -keystore release.keystore -alias nekogram -keyalg RSA -keysize 2048 -validity 10000 -storepass nekogram -keypass nekogram -dname "CN=Nekogram, OU=Nekogram, O=Nekogram, L=Unknown, ST=Unknown, C=Unknown"
          
          cat <<EOF > local.properties
          storeFile=${{ github.workspace }}/release.keystore
          storePassword=nekogram
          keyAlias=nekogram
          keyPassword=nekogram
          apiId=${{ secrets.APP_ID }}
          apiHash=${{ secrets.APP_HASH }}
          helperBotId=0
          helperBotUsername=dummy
          sentryDsn=https://dummy@sentry.io/1234567
          mapsApiKey=dummy_key
          EOF
          

      - name: Inject Firebase Configuration
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > TMessagesProj_App/google-services.json
          touch sentry.properties

      - name: Nuke Sentry from Source Code
        run: |
          find . -name "ApplicationLoaderImpl.java" -exec sed -i 's/Sentry.init/\/\/ Sentry.init/g' {} +
          find . -name "ApplicationLoaderImpl.kt" -exec sed -i 's/Sentry.init/\/\/ Sentry.init/g' {} +

      - name: Build the App
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -x uploadSentryProguardMappingsRelease -x uploadSentryNativeSymbolsForRelease -x sentryBundleSourcesRelease -x sentryCollectSourcesRelease
          
      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: Nekogram-Build
          path: TMessagesProj_App/build/outputs/apk/release/*.apk
          
